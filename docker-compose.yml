version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: astra-db
    restart: always
    environment:
      POSTGRES_DB: astra_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astra-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/astra_ai
      - SECRET_KEY=supersecretjwttokenkeyforastraai2026productionreadyjwt
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - GOOGLE_CLIENT_ID=
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astra-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
